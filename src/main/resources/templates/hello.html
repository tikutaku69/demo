<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>入力画面</title>
</head>
<body>

<form action="/task" method="post">
    <input type="text" name="task">
    <button type="submit">
        追加
    </button>
</form>

<ul>
    <li th:each="task : ${tasks}"
        th:text="${task.title}">
    </li>
</ul>

</body>
</html>
