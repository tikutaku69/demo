<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>入力画面</title>
</head>
<body>

<form action="/task" method="post">
    <input type="text" name="title">
    <button type="submit">
        追加
    </button>
</form>

<ul>
    <li th:each="task : ${tasks}">
        <span th:text="${task.title}"></span>

        <a th:href="@{/tasks/edit/{id}(id=${task.id})}">
            編集
        </a>
    </li>
</ul>

</body>
</html>
